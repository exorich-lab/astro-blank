[mcp_servers.magicuidesign-mcp]
command = "npx"
args = ["-y", "@magicuidesign/mcp@latest"]
startup_timeout_ms = 20000
enabled = true

[mcp_servers.search-console-mcp]
command = "npx"
args = ["-y", "search-console-mcp@latest"]
env = { GOOGLE_APPLICATION_CREDENTIALS = "/path/to/your/service-account-key.json" }
startup_timeout_ms = 20000
enabled = true

[mcp_servers.analytics-mcp]
command = "uv"
args = ["x", "analytics-mcp"]
env = { GOOGLE_APPLICATION_CREDENTIALS = "/path/to/your/service-account-key.json", GOOGLE_PROJECT_ID = "YOUR_GA4_PROJECT_ID" }
startup_timeout_ms = 20000
enabled = true

[mcp_servers.cloudflare-api]
url = "https://mcp.cloudflare.com/mcp"
startup_timeout_ms = 20000
enabled = true
